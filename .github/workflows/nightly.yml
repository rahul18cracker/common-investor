name: Nightly Security Scans

on:
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read

jobs:
  scan-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Build backend image
      run: docker build -t ci-backend:scan ./backend

    - name: Scan backend image
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
      with:
        image-ref: "ci-backend:scan"
        format: "table"
        exit-code: "1"
        ignore-unfixed: true
        severity: "CRITICAL,HIGH"

    - name: Build frontend image
      run: docker build -t ci-frontend:scan ./ui

    - name: Scan frontend image
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
      with:
        image-ref: "ci-frontend:scan"
        format: "table"
        exit-code: "1"
        ignore-unfixed: true
        vuln-type: "os"
        severity: "CRITICAL,HIGH"

    - name: Generate backend SBOM
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
      with:
        image-ref: "ci-backend:scan"
        format: "cyclonedx"
        output: "sbom-backend.json"

    - name: Upload SBOM
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: sbom
        path: sbom-backend.json
        retention-days: 90
