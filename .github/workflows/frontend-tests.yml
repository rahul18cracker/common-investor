name: Frontend Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'ui/**'
      - '.github/workflows/frontend-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'ui/**'
      - '.github/workflows/frontend-tests.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Set up Node.js 20
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ui/package-lock.json

    - name: Install dependencies
      working-directory: ui
      run: npm ci

    - name: Audit npm dependencies
      working-directory: ui
      run: npm audit --audit-level=high

    - name: Run unit tests with coverage
      working-directory: ui
      run: npm run test:coverage

    - name: Check coverage threshold
      working-directory: ui
      run: |
        COVERAGE=$(npm run test:coverage 2>&1 | grep "All files" | awk '{print $4}' | tr -d '%')
        echo "Current line coverage: ${COVERAGE}%"
        THRESHOLD=96
        if [ -z "$COVERAGE" ]; then
          echo "Could not extract coverage percentage"
          exit 1
        fi
        if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
          echo "Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
          exit 1
        else
          echo "Coverage ${COVERAGE}% meets threshold ${THRESHOLD}%"
        fi

    - name: Build application
      working-directory: ui
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: http://localhost:8080

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
      with:
        scan-type: 'fs'
        scan-ref: 'ui'
        format: 'sarif'
        output: 'trivy-ui-results.sarif'
        severity: 'CRITICAL,HIGH'
        exit-code: '0'

    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7  # v3
      if: always()
      with:
        sarif_file: 'trivy-ui-results.sarif'

    - name: Upload coverage reports
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      if: always()
      with:
        name: coverage-report
        path: ui/coverage/
        retention-days: 30
