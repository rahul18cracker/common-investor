name: Frontend Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'ui/**'
      - '.github/workflows/frontend-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'ui/**'
      - '.github/workflows/frontend-tests.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Set up Node.js 20
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ui/package-lock.json

    - name: Install dependencies
      working-directory: ui
      run: npm ci

    - name: Run linting
      working-directory: ui
      run: npm run lint || true
      continue-on-error: true

    - name: Run unit tests with coverage
      working-directory: ui
      run: npx --no-install vitest --run --coverage

    - name: Check coverage threshold
      working-directory: ui
      run: |
        # Extract line coverage from the coverage report
        COVERAGE=$(npx --no-install vitest --run --coverage 2>&1 | grep "All files" | awk '{print $4}' | tr -d '%')
        echo "Current line coverage: ${COVERAGE}%"

        # Minimum coverage threshold (96%)
        THRESHOLD=96

        if [ -z "$COVERAGE" ]; then
          echo "Could not extract coverage percentage"
          exit 1
        fi

        # Compare coverage (using bc for floating point comparison)
        if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
          echo "Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
          exit 1
        else
          echo "Coverage ${COVERAGE}% meets threshold ${THRESHOLD}%"
        fi

    - name: Upload coverage reports
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      if: always()
      with:
        name: coverage-report
        path: ui/coverage/
        retention-days: 30

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Set up Node.js 20
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ui/package-lock.json

    - name: Install dependencies
      working-directory: ui
      run: npm ci

    - name: Build application
      working-directory: ui
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: http://localhost:8080

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Set up Node.js 20
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ui/package-lock.json

    - name: Install dependencies
      working-directory: ui
      run: npm ci

    - name: Audit npm dependencies
      working-directory: ui
      run: npm audit --audit-level=high

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
      with:
        scan-type: 'fs'
        scan-ref: 'ui'
        format: 'sarif'
        output: 'trivy-ui-results.sarif'
        severity: 'CRITICAL,HIGH'
        exit-code: '0'  # Advisory only — findings go to GitHub Security tab

    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699  # v3
      if: always()
      with:
        sarif_file: 'trivy-ui-results.sarif'
