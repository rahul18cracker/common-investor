name: CI Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci_pass
          POSTGRES_DB: ci_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Set up Python 3.11
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: backend/requirements-dev.txt

    - name: Install dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Check formatting (black + isort)
      working-directory: backend
      run: |
        black --check app/ tests/
        isort --check-only app/ tests/

    - name: Lint with flake8
      working-directory: backend
      run: |
        flake8 app/ tests/

    - name: Type check with mypy
      working-directory: backend
      run: |
        mypy app/ --config-file pyproject.toml

    - name: Audit Python dependencies
      working-directory: backend
      run: |
        pip install pip-audit
        pip-audit -r requirements.lock --strict --desc

    - name: Security scan (bandit)
      working-directory: backend
      run: |
        pip install bandit[toml]
        bandit -c pyproject.toml -r app/ --severity-level medium

    - name: Run database migrations
      working-directory: backend
      env:
        DATABASE_URL: postgresql+psycopg2://ci:ci_pass@localhost:5432/ci_db
        REDIS_URL: redis://localhost:6379/0
        SEC_USER_AGENT: "CI/1.0 ci@example.com"
        PYTHONPATH: .
      run: |
        alembic upgrade head

    - name: Run all tests
      working-directory: backend
      env:
        DATABASE_URL: postgresql+psycopg2://ci:ci_pass@localhost:5432/ci_db
        REDIS_URL: redis://localhost:6379/0
        SEC_USER_AGENT: "CI/1.0 ci@example.com"
        PYTHONPATH: .
      run: |
        pytest tests/ \
          -v \
          --cov=app \
          --cov-report=xml \
          --cov-report=term-missing \
          --cov-fail-under=90 \
          --tb=short \
          --maxfail=5

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238  # v4
      with:
        file: ./backend/coverage.xml
        flags: backend
        name: backend-coverage
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload test results
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      if: always()
      with:
        name: test-results
        path: backend/htmlcov/
        retention-days: 30

  # All tests must pass before merge
  all-tests-pass:
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
    - name: Check all tests passed
      run: |
        if [[ "${{ needs.test.result }}" != "success" ]]; then
          echo "Backend tests: ${{ needs.test.result }}"
          exit 1
        fi
        echo "All tests passed"

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
        exit-code: '1'

    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699  # v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  scan-images:
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      security-events: write

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Build backend image
      run: docker build -t ci-backend:scan ./backend

    - name: Scan backend image
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
      with:
        image-ref: "ci-backend:scan"
        format: "table"
        exit-code: "1"
        ignore-unfixed: true
        severity: "CRITICAL,HIGH"

    - name: Build frontend image
      run: docker build -t ci-frontend:scan ./ui

    - name: Scan frontend image
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
      with:
        image-ref: "ci-frontend:scan"
        format: "table"
        exit-code: "1"
        ignore-unfixed: true
        severity: "CRITICAL,HIGH"

    - name: Generate backend SBOM
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
      with:
        image-ref: "ci-backend:scan"
        format: "cyclonedx"
        output: "sbom-backend.json"

    - name: Upload SBOM
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      with:
        name: sbom
        path: sbom-backend.json
        retention-days: 90
