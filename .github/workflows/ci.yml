name: CI Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci_pass
          POSTGRES_DB: ci_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Set up Python 3.11
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: backend/requirements-dev.txt

    - name: Install dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Check formatting (black + isort)
      working-directory: backend
      run: |
        black --check app/ tests/
        isort --check-only app/ tests/

    - name: Lint with flake8
      working-directory: backend
      run: |
        flake8 app/ tests/

    - name: Type check with mypy
      working-directory: backend
      run: |
        mypy app/ --config-file pyproject.toml

    - name: Audit Python dependencies
      working-directory: backend
      run: |
        pip install pip-audit
        pip-audit -r requirements.lock --strict --desc

    - name: Security scan (bandit)
      working-directory: backend
      run: |
        pip install bandit[toml]
        bandit -c pyproject.toml -r app/ --severity-level medium

    - name: Run database migrations
      working-directory: backend
      env:
        DATABASE_URL: postgresql+psycopg2://ci:ci_pass@localhost:5432/ci_db
        REDIS_URL: redis://localhost:6379/0
        SEC_USER_AGENT: "CI/1.0 ci@example.com"
        PYTHONPATH: .
      run: |
        alembic upgrade head

    - name: Run all tests
      working-directory: backend
      env:
        DATABASE_URL: postgresql+psycopg2://ci:ci_pass@localhost:5432/ci_db
        REDIS_URL: redis://localhost:6379/0
        SEC_USER_AGENT: "CI/1.0 ci@example.com"
        PYTHONPATH: .
      run: |
        pytest tests/ \
          -v \
          --cov=app \
          --cov-report=xml \
          --cov-report=term-missing \
          --cov-fail-under=90 \
          --tb=short \
          --maxfail=5

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
      with:
        file: ./backend/coverage.xml
        flags: backend
        name: backend-coverage
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload test results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      if: always()
      with:
        name: test-results
        path: backend/htmlcov/
        retention-days: 30

  # All tests must pass before merge
  all-tests-pass:
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
    - name: Check all tests passed
      run: |
        if [[ "${{ needs.test.result }}" != "success" ]]; then
          echo "Backend tests: ${{ needs.test.result }}"
          exit 1
        fi
        echo "All tests passed"

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
        exit-code: '0'  # Advisory only — findings go to GitHub Security tab; scan-images gates merges

    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7  # v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

